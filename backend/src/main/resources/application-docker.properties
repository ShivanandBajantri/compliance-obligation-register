# ── Docker / Production profile ───────────────────────────────────────────────
# Activated when SPRING_PROFILES_ACTIVE=docker (set in .env).
# All sensitive values come from environment variables — never hard-code here.

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway owns the schema; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Allows Flyway to run against a DB that already has a schema (safe for re-deploys)
spring.flyway.baseline-on-migrate=true

# ── Redis (Spring Boot 3 key) ─────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Redis-backed distributed cache for production
spring.cache.type=redis

# ── H2 ────────────────────────────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── HikariCP ──────────────────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── Application ───────────────────────────────────────────────────────────────
app.admin-email=${APP_ADMIN_EMAIL:admin@company.com}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.internship.tool=${LOGGING_LEVEL_COM_INTERNSHIP_TOOL:INFO}
logging.level.org.hibernate.stat=WARN
logging.level.org.springframework.security=WARN
